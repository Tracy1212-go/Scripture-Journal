<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripture Journal</title>
<style>
  :root {
    --bg: #f0f6ff;
    --surface: #ffffff;
    --surface2: #e8f1fb;
    --border: #c2d8f0;
    --text: #111111;
    --text2: #444444;
    --accent: #1a5fa8;
    --accent-light: #ddeeff;
    --accent-hover: #134d8c;
    --tag-bg: #d4edda;
    --tag-text: #1a6e35;
    --green: #2a9d52;
    --shadow: 0 2px 12px rgba(26,95,168,0.08);
    --shadow-lg: 0 8px 32px rgba(26,95,168,0.14);
    --radius: 12px;
    --transition: 0.3s cubic-bezier(.4,0,.2,1);
    --bg-art-opacity: 0.13;
  }
  [data-theme="dark"] {
    --bg: #0b1a2e;
    --surface: #112240;
    --surface2: #162d4e;
    --border: #1e3d63;
    --text: #e8f0fe;
    --text2: #8aafd4;
    --accent: #2ecc71;
    --accent-light: #0e2e1e;
    --accent-hover: #27ae60;
    --tag-bg: #0e2e1e;
    --tag-text: #2ecc71;
    --green: #2ecc71;
    --shadow: 0 2px 12px rgba(0,0,0,0.35);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
    --bg-art-opacity: 0.18;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
    position: relative;
    overflow-x: hidden;
  }

  /* ── Linen Texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(128,112,90,0.07) 3px,
        rgba(128,112,90,0.07) 4px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 3px,
        rgba(128,112,90,0.07) 3px,
        rgba(128,112,90,0.07) 4px
      ),
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 5px,
        rgba(128,112,90,0.035) 5px,
        rgba(128,112,90,0.035) 6px
      ),
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 5px,
        rgba(128,112,90,0.035) 5px,
        rgba(128,112,90,0.035) 6px
      );
    background-size: 4px 4px, 4px 4px, 6px 6px, 6px 6px;
  }
  [data-theme="dark"] body::before,
  [data-theme="dark"]::before {
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(180,200,255,0.055) 3px,
        rgba(180,200,255,0.055) 4px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 3px,
        rgba(180,200,255,0.055) 3px,
        rgba(180,200,255,0.055) 4px
      ),
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 5px,
        rgba(100,180,120,0.04) 5px,
        rgba(100,180,120,0.04) 6px
      ),
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 5px,
        rgba(100,180,120,0.04) 5px,
        rgba(100,180,120,0.04) 6px
      );
    background-size: 4px 4px, 4px 4px, 6px 6px, 6px 6px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
    transition: background var(--transition), border-color var(--transition);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.25rem;
    font-weight: bold;
    color: var(--accent);
    letter-spacing: 0.01em;
  }
  .logo svg { width: 28px; height: 28px; }
  .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .theme-btn {
    background: var(--accent-light);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 8px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: var(--accent);
    font-family: inherit;
    font-weight: 600;
    transition: all var(--transition);
  }
  .theme-btn:hover { background: var(--accent); color: var(--surface); border-color: var(--accent); }

  .design-select-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--accent-light);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 6px 14px 6px 12px;
    transition: all var(--transition);
  }
  .design-select-wrap span { font-size: 0.85rem; color: var(--accent); font-family: -apple-system, sans-serif; font-weight: 600; white-space: nowrap; }
  .design-select-wrap select {
    background: transparent;
    border: none;
    outline: none;
    font-size: 0.85rem;
    color: var(--accent);
    font-family: -apple-system, sans-serif;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
    appearance: none;
    -webkit-appearance: none;
  }
  .design-select-wrap select option { background: var(--surface); color: var(--text); }

  main { max-width: 820px; margin: 0 auto; padding: 36px 20px 60px; position: relative; z-index: 1; }
  h2 { font-size: 1.4rem; color: var(--accent); margin-bottom: 20px; font-weight: bold; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 32px;
    transition: background var(--transition), border-color var(--transition);
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: -apple-system, sans-serif;
  }
  input, textarea {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 0.95rem;
    color: var(--text);
    font-family: 'Georgia', serif;
    transition: border-color var(--transition), background var(--transition);
    outline: none;
    width: 100%;
  }
  input:focus, textarea:focus { border-color: var(--accent); background: var(--surface); }
  textarea { resize: vertical; min-height: 110px; line-height: 1.6; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: opacity(0.5); cursor: pointer; }
  .btn-row { display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px; }
  .btn {
    padding: 11px 28px;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,95,168,0.25); }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1.5px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .search-bar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
  .search-bar input { flex: 1; }
  .entry-count { font-size: 0.82rem; color: var(--text2); font-family: -apple-system, sans-serif; white-space: nowrap; }
  .entries { display: flex; flex-direction: column; gap: 16px; }
  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, background var(--transition), border-color var(--transition);
    position: relative;
  }
  .entry-card:hover { box-shadow: var(--shadow-lg); }
  .entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 12px; }
  .entry-ref { font-size: 1.05rem; font-weight: bold; color: var(--accent); }
  .entry-date { font-size: 0.8rem; color: var(--text2); font-family: -apple-system, sans-serif; white-space: nowrap; }
  .entry-text {
    font-size: 0.97rem;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 14px;
    border-left: 3px solid var(--accent-light);
    padding-left: 14px;
    font-style: italic;
  }
  .entry-comments {
    font-size: 0.93rem;
    line-height: 1.7;
    color: var(--text);
    background: var(--accent-light);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 14px;
    white-space: pre-wrap;
  }
  .comments-label {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
    font-family: -apple-system, sans-serif;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 50px;
    padding: 3px 12px;
    font-size: 0.76rem;
    font-family: -apple-system, sans-serif;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .entry-actions { position: absolute; top: 16px; right: 16px; display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s; }
  .entry-card:hover .entry-actions { opacity: 1; }
  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
    font-size: 0.85rem;
  }
  .icon-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .icon-btn.del:hover { background: #c0392b; border-color: #c0392b; }
  .empty { text-align: center; padding: 48px 20px; color: var(--text2); font-family: -apple-system, sans-serif; }
  .empty svg { width: 48px; height: 48px; margin-bottom: 14px; opacity: 0.35; }
  .empty p { font-size: 0.95rem; }
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: #fff; padding: 12px 24px;
    border-radius: 50px; font-size: 0.9rem; font-family: -apple-system, sans-serif;
    font-weight: 600; box-shadow: var(--shadow-lg);
    transition: transform 0.4s cubic-bezier(.4,0,.2,1); z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    main { padding: 20px 14px 50px; }
    .header-controls { gap: 6px; }
    .theme-btn span:last-child { display: none; }
  }
</style>
</head>
<body>


<header>
  <div class="logo">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="24" height="24" rx="4" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <path d="M8 9h12M8 13h12M8 17h8" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="21" cy="19" r="4" fill="var(--accent)"/>
      <path d="M21 17.5v3M19.5 19h3" stroke="var(--surface)" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    Scripture Journal
  </div>
  <div class="header-controls">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
      <span id="themeIcon">🌙</span>
      <span id="themeLabel">Dark Mode</span>
    </button>
  </div>
</header>

<main>
  <div class="card">
    <h2>✦ New Entry</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Scripture Text</label>
        <textarea id="scriptureText" placeholder="Enter the scripture passage here…" rows="5"></textarea>
      </div>
      <div class="form-group full">
        <label>Source / Reference</label>
        <input type="text" id="sourceRef" placeholder="e.g. John 3:16, Psalm 23:1-3">
      </div>
      <div class="form-group full">
        <label>Comments / Observations</label>
        <textarea id="comments" placeholder="Your personal reflections, insights, or notes on this passage…" rows="4"></textarea>
      </div>
      <div class="form-group" style="max-width:180px;">
        <label>Date</label>
        <input type="date" id="entryDate">
      </div>
      <div class="form-group">
        <label>Keywords / Tags</label>
        <input type="text" id="tags" placeholder="faith, grace, hope (comma-separated)">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
      <button class="btn btn-primary" onclick="saveEntry()">Save Entry</button>
    </div>
  </div>

  <div class="card">
    <h2>📖 My Journal</h2>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by keyword, tag, reference, or comments…" oninput="renderEntries()">
      <span class="entry-count" id="entryCount"></span>
    </div>
    <div class="entries" id="entriesList"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  let entries = [];
  let editingId = null;

  // ── Init ──────────────────────────────────────────────────────────────────
  (function init() {
    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
    const savedTheme = localStorage.getItem('sj_theme') || 'light';
    applyTheme(savedTheme);

    try { entries = JSON.parse(localStorage.getItem('sj_entries') || '[]'); } catch(e) { entries = []; }
    renderEntries();
  })();

  // ── Theme ──────────────────────────────────────────────────────────────────
  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(cur === 'dark' ? 'light' : 'dark');
  }
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('sj_theme', t);
    document.getElementById('themeIcon').textContent = t === 'dark' ? '☀️' : '🌙';
    document.getElementById('themeLabel').textContent = t === 'dark' ? 'Light Mode' : 'Dark Mode';
    renderBgArt(currentDesign);
  }

  // ── Background Art ─────────────────────────────────────────────────────────


  // ── Save / Edit ────────────────────────────────────────────────────────────
  function saveEntry() {
    const text     = document.getElementById('scriptureText').value.trim();
    const ref      = document.getElementById('sourceRef').value.trim();
    const date     = document.getElementById('entryDate').value;
    const tags     = document.getElementById('tags').value.trim();
    const comments = document.getElementById('comments').value.trim();

    if (!text) { showToast('Please enter scripture text.'); return; }
    if (!ref)  { showToast('Please add a reference.'); return; }

    const tagArr = tags ? tags.split(',').map(t => t.trim()).filter(Boolean) : [];

    if (editingId) {
      const idx = entries.findIndex(e => e.id === editingId);
      if (idx !== -1) entries[idx] = { ...entries[idx], text, ref, date, tags: tagArr, comments };
      editingId = null;
      document.querySelector('.btn-primary').textContent = 'Save Entry';
      showToast('Entry updated ✓');
    } else {
      entries.unshift({ id: Date.now().toString(), text, ref, date, tags: tagArr, comments });
      showToast('Entry saved ✓');
    }
    persist(); clearForm(); renderEntries();
  }

  function clearForm() {
    document.getElementById('scriptureText').value = '';
    document.getElementById('sourceRef').value = '';
    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('tags').value = '';
    document.getElementById('comments').value = '';
    editingId = null;
    document.querySelector('.btn-primary').textContent = 'Save Entry';
  }

  function editEntry(id) {
    const e = entries.find(x => x.id === id);
    if (!e) return;
    document.getElementById('scriptureText').value = e.text;
    document.getElementById('sourceRef').value = e.ref;
    document.getElementById('entryDate').value = e.date;
    document.getElementById('tags').value = e.tags.join(', ');
    document.getElementById('comments').value = e.comments || '';
    editingId = id;
    document.querySelector('.btn-primary').textContent = 'Update Entry';
    document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
  }

  function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    entries = entries.filter(e => e.id !== id);
    persist(); renderEntries(); showToast('Entry deleted');
  }

  function persist() { localStorage.setItem('sj_entries', JSON.stringify(entries)); }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderEntries() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const list = document.getElementById('entriesList');
    const filtered = entries.filter(e =>
      !q ||
      e.text.toLowerCase().includes(q) ||
      e.ref.toLowerCase().includes(q) ||
      (e.comments || '').toLowerCase().includes(q) ||
      e.tags.some(t => t.toLowerCase().includes(q))
    );

    document.getElementById('entryCount').textContent =
      filtered.length === entries.length
        ? `${entries.length} entr${entries.length === 1 ? 'y' : 'ies'}`
        : `${filtered.length} of ${entries.length}`;

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty">
        <svg viewBox="0 0 48 48" fill="none"><rect x="6" y="4" width="36" height="40" rx="4" stroke="currentColor" stroke-width="2"/><path d="M14 16h20M14 22h20M14 28h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <p>${entries.length === 0 ? 'Your journal is empty. Add your first entry above.' : 'No entries match your search.'}</p>
      </div>`;
      return;
    }

    list.innerHTML = filtered.map(e => `
      <div class="entry-card">
        <div class="entry-actions">
          <button class="icon-btn" title="Edit" onclick="editEntry('${e.id}')">✎</button>
          <button class="icon-btn del" title="Delete" onclick="deleteEntry('${e.id}')">✕</button>
        </div>
        <div class="entry-header">
          <span class="entry-ref">${esc(e.ref)}</span>
          <span class="entry-date">${fmtDate(e.date)}</span>
        </div>
        <div class="entry-text">${esc(e.text)}</div>
        ${e.comments ? `<div class="entry-comments"><span class="comments-label">✦ My Notes</span>${esc(e.comments)}</div>` : ''}
        ${e.tags.length ? `<div class="tags">${e.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
      </div>
    `).join('');
  }

  function fmtDate(d) {
    if (!d) return '';
    const [y,m,day] = d.split('-');
    return new Date(y, m-1, day).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }
</script>
</body>
</html>
