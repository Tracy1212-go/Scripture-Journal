<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripture Journal</title>
<style>
  :root {
    --bg: #f0f6ff;
    --surface: #ffffff;
    --surface2: #e8f1fb;
    --border: #c2d8f0;
    --text: #111111;
    --text2: #444444;
    --accent: #1a5fa8;
    --accent-light: #ddeeff;
    --accent-hover: #134d8c;
    --tag-bg: #d4edda;
    --tag-text: #1a6e35;
    --danger: #c0392b;
    --danger-light: #fdecea;
    --shadow: 0 2px 12px rgba(26,95,168,0.08);
    --shadow-lg: 0 8px 32px rgba(26,95,168,0.14);
    --radius: 12px;
    --transition: 0.3s cubic-bezier(.4,0,.2,1);
  }
  [data-theme="dark"] {
    --bg: #0b1a2e;
    --surface: #112240;
    --surface2: #162d4e;
    --border: #1e3d63;
    --text: #e8f0fe;
    --text2: #8aafd4;
    --accent: #2ecc71;
    --accent-light: #0e2e1e;
    --accent-hover: #27ae60;
    --tag-bg: #0e2e1e;
    --tag-text: #2ecc71;
    --danger: #e74c3c;
    --danger-light: #2a0f0f;
    --shadow: 0 2px 12px rgba(0,0,0,0.35);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(128,112,90,0.07) 3px, rgba(128,112,90,0.07) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(128,112,90,0.07) 3px, rgba(128,112,90,0.07) 4px),
      repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(128,112,90,0.035) 5px, rgba(128,112,90,0.035) 6px),
      repeating-linear-gradient(-45deg, transparent, transparent 5px, rgba(128,112,90,0.035) 5px, rgba(128,112,90,0.035) 6px);
    background-size: 4px 4px, 4px 4px, 6px 6px, 6px 6px;
  }
  [data-theme="dark"] body::before {
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(180,200,255,0.055) 3px, rgba(180,200,255,0.055) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(180,200,255,0.055) 3px, rgba(180,200,255,0.055) 4px),
      repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(100,180,120,0.04) 5px, rgba(100,180,120,0.04) 6px),
      repeating-linear-gradient(-45deg, transparent, transparent 5px, rgba(100,180,120,0.04) 5px, rgba(100,180,120,0.04) 6px);
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
    transition: background var(--transition), border-color var(--transition);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.25rem;
    font-weight: bold;
    color: var(--accent);
  }
  .logo svg { width: 28px; height: 28px; }
  .theme-btn {
    background: var(--accent-light);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 8px 18px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--accent);
    font-family: inherit;
    font-weight: 600;
    transition: all var(--transition);
  }
  .theme-btn:hover { background: var(--accent); color: var(--surface); border-color: var(--accent); }
  main { max-width: 820px; margin: 0 auto; padding: 36px 20px 60px; position: relative; z-index: 1; }
  h2 { font-size: 1.4rem; color: var(--accent); margin-bottom: 20px; font-weight: bold; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 32px;
    transition: background var(--transition), border-color var(--transition);
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group.narrow { max-width: 180px; }
  label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: -apple-system, sans-serif;
  }
  input, textarea {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 0.95rem;
    color: var(--text);
    font-family: Georgia, serif;
    transition: border-color var(--transition), background var(--transition);
    outline: none;
    width: 100%;
  }
  input:focus, textarea:focus { border-color: var(--accent); background: var(--surface); }
  textarea { resize: vertical; min-height: 110px; line-height: 1.6; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: opacity(0.5); cursor: pointer; }
  .btn-row { display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px; }
  .btn {
    padding: 11px 28px;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1.5px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { opacity: 0.88; transform: translateY(-1px); }

  /* ΟΔβÄùβ²§ΟΔβÄùβ²§ Journal toolbar ΟΔβÄùβ²§ΟΔβÄùβ²§ */
  .journal-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .search-bar { display: flex; gap: 12px; align-items: center; flex: 1; min-width: 200px; }
  .search-bar input { flex: 1; }
  .entry-count { font-size: 0.82rem; color: var(--text2); font-family: -apple-system, sans-serif; white-space: nowrap; }
  .select-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .sel-btn {
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-family: -apple-system, sans-serif;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .sel-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .sel-btn.danger { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }
  .sel-btn.danger:hover { background: var(--danger); color: #fff; }
  .sel-btn:disabled { opacity: 0.4; pointer-events: none; }

  /* ΟΔβÄùβ²§ΟΔβÄùβ²§ Selection mode indicator ΟΔβÄùβ²§ΟΔβÄùβ²§ */
  .select-mode-bar {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--accent-light);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 14px;
    font-family: -apple-system, sans-serif;
    font-size: 0.88rem;
    color: var(--accent);
    font-weight: 600;
  }
  .select-mode-bar.active { display: flex; }

  /* ΟΔβÄùβ²§ΟΔβÄùβ²§ Entry cards ΟΔβÄùβ²§ΟΔβÄùβ²§ */
  .entries { display: flex; flex-direction: column; gap: 16px; }
  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, background var(--transition), border-color var(--transition), outline 0.15s;
    position: relative;
    cursor: default;
  }
  .entry-card:hover { box-shadow: var(--shadow-lg); }
  .select-mode .entry-card { cursor: pointer; }
  .select-mode .entry-card:hover { outline: 2px solid var(--accent); }
  .entry-card.selected {
    outline: 2.5px solid var(--accent);
    background: var(--accent-light);
  }
  .entry-checkbox {
    display: none;
    position: absolute;
    top: 14px;
    left: 14px;
    width: 20px;
    height: 20px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .select-mode .entry-checkbox { display: block; }
  .select-mode .entry-header { padding-left: 30px; }
  .entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 12px; transition: padding 0.2s; }
  .entry-ref { font-size: 1.05rem; font-weight: bold; color: var(--accent); }
  .entry-date { font-size: 0.8rem; color: var(--text2); font-family: -apple-system, sans-serif; white-space: nowrap; }
  .entry-text {
    font-size: 0.97rem;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 14px;
    border-left: 3px solid var(--border);
    padding-left: 14px;
    font-style: italic;
  }
  .entry-comments {
    font-size: 0.93rem;
    line-height: 1.7;
    color: var(--text);
    background: var(--accent-light);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 14px;
    white-space: pre-wrap;
  }
  .comments-label {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
    font-family: -apple-system, sans-serif;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 50px;
    padding: 3px 12px;
    font-size: 0.76rem;
    font-family: -apple-system, sans-serif;
    font-weight: 600;
  }
  .entry-actions { position: absolute; top: 16px; right: 16px; display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s; }
  .entry-card:hover .entry-actions { opacity: 1; }
  .select-mode .entry-actions { display: none; }
  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text2);
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .icon-btn.del:hover { background: var(--danger); border-color: var(--danger); }
  .empty { text-align: center; padding: 48px 20px; color: var(--text2); font-family: -apple-system, sans-serif; }
  .empty svg { width: 48px; height: 48px; margin-bottom: 14px; opacity: 0.35; }

  /* ΟΔβÄùβ²§ΟΔβÄùβ²§ Confirm modal ΟΔβÄùβ²§ΟΔβÄùβ²§ */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    max-width: 400px;
    width: 90%;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }
  .modal h3 { font-size: 1.2rem; color: var(--danger); margin-bottom: 12px; }
  .modal p { font-size: 0.95rem; color: var(--text2); margin-bottom: 24px; font-family: -apple-system, sans-serif; line-height: 1.5; }
  .modal p strong { color: var(--text); }
  .modal-btns { display: flex; gap: 12px; justify-content: center; }

  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: #fff; padding: 12px 24px;
    border-radius: 50px; font-size: 0.9rem; font-family: -apple-system, sans-serif;
    font-weight: 600; box-shadow: var(--shadow-lg);
    transition: transform 0.4s cubic-bezier(.4,0,.2,1); z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full, .form-group.narrow { grid-column: 1; max-width: 100%; }
    main { padding: 20px 14px 50px; }
    .journal-toolbar { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="24" height="24" rx="4" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="1.5"/>
      <path d="M8 9h12M8 13h12M8 17h8" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="21" cy="19" r="4" fill="var(--accent)"/>
      <path d="M21 17.5v3M19.5 19h3" stroke="var(--surface)" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    Scripture Journal
  </div>
  <button class="theme-btn" id="themeBtn">[ Dark Mode ]</button>
</header>

<main>
  <div class="card">
    <h2>New Entry</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Scripture Text</label>
        <textarea id="f-text" placeholder="Enter the scripture passage here..." rows="5"></textarea>
      </div>
      <div class="form-group full">
        <label>Source / Reference</label>
        <input type="text" id="f-ref" placeholder="e.g. John 3:16, Psalm 23:1-3">
      </div>
      <div class="form-group full">
        <label>Comments / Observations</label>
        <textarea id="f-comments" placeholder="Your personal reflections, insights, or notes..." rows="4"></textarea>
      </div>
      <div class="form-group narrow">
        <label>Date</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>Keywords / Tags</label>
        <input type="text" id="f-tags" placeholder="faith, grace, hope (comma-separated)">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="clearBtn">Clear</button>
      <button class="btn btn-primary" id="saveBtn">Save Entry</button>
    </div>
  </div>

  <div class="card">
    <h2>My Journal</h2>
    <div class="journal-toolbar">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by keyword, tag, reference, or comments...">
        <span class="entry-count" id="entryCount"></span>
      </div>
      <div class="select-controls">
        <button class="sel-btn" id="toggleSelectBtn">Select Entries</button>
        <button class="sel-btn" id="selectAllBtn" style="display:none;">Select All</button>
        <button class="sel-btn danger" id="deleteSelectedBtn" style="display:none;" disabled>Delete Selected (0)</button>
        <button class="sel-btn" id="cancelSelectBtn" style="display:none;">Cancel</button>
      </div>
    </div>
    <div class="select-mode-bar" id="selectModeBar">
      Selection mode is ON ΟΔβ²§βÄù tap entries to select them, then press Delete Selected.
    </div>
    <div class="entries" id="entriesList"></div>
  </div>
</main>

<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Delete Entries?</h3>
    <p id="modalMsg">Are you sure you want to delete these entries? <strong>This cannot be undone.</strong></p>
    <div class="modal-btns">
      <button class="btn btn-secondary" id="modalCancelBtn">No, Keep Them</button>
      <button class="btn btn-danger" id="modalConfirmBtn">Yes, Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';

  var STORE_KEY = 'sj_entries';
  var THEME_KEY = 'sj_theme';

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtDate(d) {
    if (!d) return '';
    var p = d.split('-');
    return new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]))
      .toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function today() {
    var d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  function loadEntries() {
    try { var r = localStorage.getItem(STORE_KEY); return r ? JSON.parse(r) : []; }
    catch (e) { return []; }
  }

  function saveEntries(arr) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(arr)); }
    catch (e) { showToast('Storage error.'); }
  }

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ State ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
  var entries    = loadEntries();
  var editingId  = null;
  var selectMode = false;
  var selected   = {};   // id -> true

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ DOM ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
  var fText     = document.getElementById('f-text');
  var fRef      = document.getElementById('f-ref');
  var fComments = document.getElementById('f-comments');
  var fDate     = document.getElementById('f-date');
  var fTags     = document.getElementById('f-tags');
  var saveBtn   = document.getElementById('saveBtn');
  var clearBtn  = document.getElementById('clearBtn');
  var searchEl  = document.getElementById('searchInput');
  var listEl    = document.getElementById('entriesList');
  var countEl   = document.getElementById('entryCount');
  var themeBtn  = document.getElementById('themeBtn');

  var toggleSelectBtn   = document.getElementById('toggleSelectBtn');
  var selectAllBtn      = document.getElementById('selectAllBtn');
  var deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
  var cancelSelectBtn   = document.getElementById('cancelSelectBtn');
  var selectModeBar     = document.getElementById('selectModeBar');

  var modalOverlay  = document.getElementById('modalOverlay');
  var modalMsg      = document.getElementById('modalMsg');
  var modalConfirm  = document.getElementById('modalConfirmBtn');
  var modalCancel   = document.getElementById('modalCancelBtn');

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Init ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
  fDate.value = today();
  applyTheme(localStorage.getItem(THEME_KEY) || 'light');
  renderEntries();

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Theme ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
  themeBtn.addEventListener('click', function () {
    var cur = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(cur === 'dark' ? 'light' : 'dark');
  });

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem(THEME_KEY, t);
    themeBtn.textContent = t === 'dark' ? '[ Light Mode ]' : '[ Dark Mode ]';
  }

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Save ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
  saveBtn.addEventListener('click', function () {
    var text     = fText.value.trim();
    var ref      = fRef.value.trim();
    var comments = fComments.value.trim();
    var date     = fDate.value;
    var tagsRaw  = fTags.value.trim();
    var tags     = tagsRaw ? tagsRaw.split(',').map(function (t) { return t.trim(); }).filter(Boolean) : [];

    if (!text) { showToast('Please enter scripture text.'); return; }
    if (!ref)  { showToast('Please add a source / reference.'); return; }

    if (editingId) {
      for (var i = 0; i < entries.length; i++) {
        if (entries[i].id === editingId) {
          entries[i].text = text; entries[i].ref = ref;
          entries[i].comments = comments; entries[i].date = date; entries[i].tags = tags;
          break;
        }
      }
      editingId = null;
      saveBtn.textContent = 'Save Entry';
      showToast('Entry updated.');
    } else {
      entries.unshift({ id: String(Date.now()), text: text, ref: ref, comments: comments, date: date, tags: tags });
      showToast('Entry saved.');
    }
    saveEntries(entries);
    clearForm();
    renderEntries();
  });

  clearBtn.addEventListener('click', function () {
    editingId = null;
    saveBtn.textContent = 'Save Entry';
    clearForm();
  });

  function clearForm() {
    fText.value = ''; fRef.value = ''; fComments.value = '';
    fDate.value = today(); fTags.value = '';
  }

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Select mode controls ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
  toggleSelectBtn.addEventListener('click', function () {
    enterSelectMode();
  });

  cancelSelectBtn.addEventListener('click', function () {
    exitSelectMode();
  });

  selectAllBtn.addEventListener('click', function () {
    var q = searchEl.value.toLowerCase();
    var filtered = getFiltered(q);
    var allSelected = filtered.every(function (e) { return selected[e.id]; });
    selected = {};
    if (!allSelected) {
      filtered.forEach(function (e) { selected[e.id] = true; });
    }
    renderEntries();
    updateDeleteBtn();
  });

  deleteSelectedBtn.addEventListener('click', function () {
    var count = Object.keys(selected).length;
    if (count === 0) return;
    modalMsg.innerHTML = 'You are about to permanently delete <strong>' + count +
      ' entr' + (count === 1 ? 'y' : 'ies') + '</strong>. This cannot be undone.';
    modalOverlay.classList.add('open');
  });

  modalCancel.addEventListener('click', function () {
    modalOverlay.classList.remove('open');
  });

  modalConfirm.addEventListener('click', function () {
    var count = Object.keys(selected).length;
    entries = entries.filter(function (e) { return !selected[e.id]; });
    saveEntries(entries);
    selected = {};
    modalOverlay.classList.remove('open');
    exitSelectMode();
    showToast(count + ' entr' + (count === 1 ? 'y' : 'ies') + ' deleted.');
    renderEntries();
  });

  // Click outside modal to cancel
  modalOverlay.addEventListener('click', function (e) {
    if (e.target === modalOverlay) modalOverlay.classList.remove('open');
  });

  function enterSelectMode() {
    selectMode = true;
    selected = {};
    toggleSelectBtn.style.display = 'none';
    selectAllBtn.style.display = '';
    deleteSelectedBtn.style.display = '';
    cancelSelectBtn.style.display = '';
    selectModeBar.classList.add('active');
    listEl.classList.add('select-mode');
    updateDeleteBtn();
    renderEntries();
  }

  function exitSelectMode() {
    selectMode = false;
    selected = {};
    toggleSelectBtn.style.display = '';
    selectAllBtn.style.display = 'none';
    deleteSelectedBtn.style.display = 'none';
    cancelSelectBtn.style.display = 'none';
    selectModeBar.classList.remove('active');
    listEl.classList.remove('select-mode');
    renderEntries();
  }

  function updateDeleteBtn() {
    var count = Object.keys(selected).length;
    deleteSelectedBtn.textContent = 'Delete Selected (' + count + ')';
    deleteSelectedBtn.disabled = count === 0;
  }

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Entry card clicks (edit, delete single, select) ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
  listEl.addEventListener('click', function (e) {
    if (selectMode) {
      var card = e.target.closest('.entry-card');
      if (!card) return;
      var id = card.getAttribute('data-id');
      var cb = card.querySelector('.entry-checkbox');
      if (selected[id]) {
        delete selected[id];
        card.classList.remove('selected');
        if (cb) cb.checked = false;
      } else {
        selected[id] = true;
        card.classList.add('selected');
        if (cb) cb.checked = true;
      }
      updateDeleteBtn();
      return;
    }

    var editBtn = e.target.closest('.edit-btn');
    var delBtn  = e.target.closest('.del-btn');

    if (editBtn) {
      var eid = editBtn.getAttribute('data-id');
      var entry = null;
      for (var i = 0; i < entries.length; i++) {
        if (entries[i].id === eid) { entry = entries[i]; break; }
      }
      if (!entry) return;
      fText.value = entry.text; fRef.value = entry.ref;
      fComments.value = entry.comments || ''; fDate.value = entry.date;
      fTags.value = entry.tags.join(', ');
      editingId = eid;
      saveBtn.textContent = 'Update Entry';
      document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
    }

    if (delBtn) {
      var did = delBtn.getAttribute('data-id');
      var dentry = null;
      for (var j = 0; j < entries.length; j++) {
        if (entries[j].id === did) { dentry = entries[j]; break; }
      }
      modalMsg.innerHTML = 'You are about to delete <strong>"' + esc(dentry ? dentry.ref : 'this entry') +
        '"</strong>. This cannot be undone.';
      modalOverlay.classList.add('open');
      modalConfirm.setAttribute('data-single', did);
    }
  });

  // Handle single-entry delete confirmation separately
  modalConfirm.addEventListener('click', function () {
    // Already handled above for bulk; for single we check data-single
  }, false);

  // Override modal confirm to handle both single and bulk
  modalConfirm.onclick = function () {
    var singleId = modalConfirm.getAttribute('data-single');
    if (singleId) {
      entries = entries.filter(function (e) { return e.id !== singleId; });
      saveEntries(entries);
      modalConfirm.removeAttribute('data-single');
      modalOverlay.classList.remove('open');
      showToast('Entry deleted.');
      renderEntries();
    } else {
      var count = Object.keys(selected).length;
      entries = entries.filter(function (e) { return !selected[e.id]; });
      saveEntries(entries);
      selected = {};
      modalOverlay.classList.remove('open');
      exitSelectMode();
      showToast(count + ' entr' + (count === 1 ? 'y' : 'ies') + ' deleted.');
      renderEntries();
    }
  };

  modalCancel.onclick = function () {
    modalConfirm.removeAttribute('data-single');
    modalOverlay.classList.remove('open');
  };

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Search ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
  searchEl.addEventListener('input', renderEntries);

  function getFiltered(q) {
    return entries.filter(function (e) {
      if (!q) return true;
      return (
        e.text.toLowerCase().indexOf(q) !== -1 ||
        e.ref.toLowerCase().indexOf(q) !== -1 ||
        (e.comments || '').toLowerCase().indexOf(q) !== -1 ||
        e.tags.some(function (t) { return t.toLowerCase().indexOf(q) !== -1; })
      );
    });
  }

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Render ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
  function renderEntries() {
    var q = searchEl.value.toLowerCase();
    var filtered = getFiltered(q);

    countEl.textContent = filtered.length === entries.length
      ? entries.length + ' entr' + (entries.length === 1 ? 'y' : 'ies')
      : filtered.length + ' of ' + entries.length;

    if (filtered.length === 0) {
      listEl.innerHTML =
        '<div class="empty">' +
        '<svg viewBox="0 0 48 48" fill="none"><rect x="6" y="4" width="36" height="40" rx="4" stroke="currentColor" stroke-width="2"/>' +
        '<path d="M14 16h20M14 22h20M14 28h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>' +
        '<p>' + (entries.length === 0 ? 'Your journal is empty. Add your first entry above.' : 'No entries match your search.') + '</p>' +
        '</div>';
      return;
    }

    var html = '';
    for (var i = 0; i < filtered.length; i++) {
      var e = filtered[i];
      var isSelected = !!selected[e.id];
      var tagsHtml = '';
      for (var j = 0; j < e.tags.length; j++) {
        tagsHtml += '<span class="tag">' + esc(e.tags[j]) + '</span>';
      }
      html +=
        '<div class="entry-card' + (isSelected ? ' selected' : '') + '" data-id="' + esc(e.id) + '">' +
          '<input type="checkbox" class="entry-checkbox"' + (isSelected ? ' checked' : '') + ' tabindex="-1">' +
          '<div class="entry-actions">' +
            '<button class="icon-btn edit-btn" data-id="' + esc(e.id) + '" title="Edit">&#9998;</button>' +
            '<button class="icon-btn del del-btn" data-id="' + esc(e.id) + '" title="Delete">&#x2715;</button>' +
          '</div>' +
          '<div class="entry-header">' +
            '<span class="entry-ref">' + esc(e.ref) + '</span>' +
            '<span class="entry-date">' + fmtDate(e.date) + '</span>' +
          '</div>' +
          '<div class="entry-text">' + esc(e.text) + '</div>' +
          (e.comments ? '<div class="entry-comments"><span class="comments-label">My Notes</span>' + esc(e.comments) + '</div>' : '') +
          (e.tags.length ? '<div class="tags">' + tagsHtml + '</div>' : '') +
        '</div>';
    }
    listEl.innerHTML = html;
    if (selectMode) listEl.classList.add('select-mode');
  }

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Toast ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§
  var toastEl = document.getElementById('toast');
  var toastTimer;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 2500);
  }

}());
</script>
</body>
</html>
